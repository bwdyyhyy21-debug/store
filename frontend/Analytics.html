<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <link rel="icon" type="image/png" href="imgs/logo2.png">
    <title>Pure Guard | Analytics & Insights</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --sidebar-color: #0c0c0c;
            --main-bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #007bff;
            --text-muted: #888;
            --border: #2a2a2a;
            --success: #28a745;
            --danger: #dc3545;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            background-color: var(--main-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        body {
            display: flex;
        }

        /* Sidebar */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-color); 
            height: 100vh;
            position: fixed;
            padding: 40px 20px;
            z-index: 1000;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .sidebar h2 { font-size: 22px; letter-spacing: 3px; margin-bottom: 40px; text-align: center; font-weight: 700; }

        .sidebar nav a { 
            color: var(--text-muted); 
            text-decoration: none; 
            display: flex;
            align-items: center;
            padding: 14px 20px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            font-size: 15px;
            transition: 0.3s;
            gap: 12px;
        }

        .sidebar nav a.active { background: var(--accent); color: white; }
        .sidebar nav a:hover:not(.active) { background: #1a1a1a; color: white; }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            flex: 1;
            width: calc(100% - 260px);
            min-width: 0;
            box-sizing: border-box;
            transition: 0.3s;
        }

        /* Stats Grid */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-card i { font-size: 24px; color: var(--accent); }
        .stat-card span { color: var(--text-muted); font-size: 13px; }
        .stat-card strong { font-size: 24px; word-break: break-word; }

        /* Tables & Lists */
        .analytics-section {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .product-row {
            display: grid;
            grid-template-columns: 60px 1fr 80px 100px;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            gap: 15px;
        }

        .product-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #252525; }
        
        .view-bar-container {
            width: 100%;
            height: 6px;
            background: #252525;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }
        .view-bar-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: 1s ease-in-out; }

        .trend-up { color: var(--success); font-size: 11px; font-weight: 600; }

        @media (max-width: 992px) {
            .sidebar { width: 80px; padding: 40px 10px; }
            .sidebar h2 { font-size: 12px; letter-spacing: 1px; }
            .sidebar nav a span { display: none; }
            .sidebar nav a { justify-content: center; padding: 15px; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 20px; }
        }

        @media (max-width: 600px) {
            .sidebar {
                bottom: 0; top: auto; height: 65px; width: 100% !important; position: fixed; 
                padding: 0; display: flex; flex-direction: row; align-items: center;
                border-top: 1px solid var(--border);
            }
            .sidebar h2 { display: none; }
            .sidebar nav { display: flex; width: 100%; justify-content: space-around; padding: 0 10px; }
            .sidebar nav a { margin-bottom: 0; padding: 10px; flex-direction: column; gap: 4px; font-size: 10px; }
            .sidebar nav a i { font-size: 18px; }
            
            .main-content { 
                margin-left: 0 !important; 
                width: 100%;
                margin-bottom: 80px; 
                padding: 15px; 
            }
            .product-row { grid-template-columns: 50px 1fr 60px; }
            .product-row > div:last-child { display: none; }
            .stat-card strong { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>PURE GUARD</h2>
    <nav>
        <a href="admin.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
        <a href="categories.html"><i class="fas fa-tags"></i> <span>Categories</span></a>
        <a href="Analytics.html" class="active"><i class="fas fa-chart-bar"></i> <span>Analytics</span></a>
        <a href="orders.html"><i class="fas fa-shopping-basket"></i> <span>Orders</span></a>
        <a href="setadmin.html"><i class="fas fa-user-shield"></i> <span>Admins</span></a>   
        <a href="index.html"><i class="fas fa-shopping-bag"></i> <span>Store</span></a>
    </nav>
</div>

<div class="main-content">
    <h1 style="font-size: 24px; margin-bottom: 30px;">Store Insights</h1>

    <div class="stats-overview">
        <div class="stat-card">
            <i class="fas fa-eye"></i>
            <span>Total Views</span>
            <strong id="totalViews">0</strong>
        </div>
        <div class="stat-card">
            <i class="fas fa-shopping-cart"></i>
            <span>Conv. Rate</span>
            <strong id="conversionRate">0%</strong>
        </div>
        <div class="stat-card">
            <i class="fas fa-fire"></i>
            <span>Best Seller</span>
            <strong id="hotProductName">-</strong>
        </div>
    </div>

    <div class="analytics-section">
        <div class="section-header">
            <h3 style="margin:0; font-size: 18px;"><i class="fas fa-medal"></i> Top Performing Products</h3>
            <span style="font-size: 12px; color: var(--text-muted);">Ranked by total sales</span>
        </div>
        <div id="productsAnalyticsList"></div>
    </div>
</div>

<script>
    async function loadAnalytics() {
        try {
            // جلب البيانات من السيرفر
            const [prodRes, orderRes] = await Promise.all([
                fetch("http://localhost:3000/products"),
                fetch("http://localhost:3000/admin/orders")
            ]);
            
            const products = await prodRes.json();
            const orders = await orderRes.json();

            // 1. حساب إجمالي المشاهدات
            const totalViews = products.reduce((sum, p) => sum + (p.views || 0), 0);
            document.getElementById('totalViews').innerText = totalViews.toLocaleString();

            // 2. حساب المبيعات لكل منتج
            const salesMap = {};
            orders.forEach(order => {
                if(order.items && Array.isArray(order.items)) {
                    order.items.forEach(item => {
                        salesMap[item.name] = (salesMap[item.name] || 0) + (item.qty || 1);
                    });
                }
            });

            // 3. دمج بيانات المبيعات مع المنتجات وترتيبهم
            const productsWithStats = products.map(p => ({
                ...p,
                salesCount: salesMap[p.name] || 0
            })).sort((a, b) => b.salesCount - a.salesCount);

            // 4. عرض المنتج الأكثر مبيعاً
            const topProduct = productsWithStats[0];
            document.getElementById('hotProductName').innerText = 
                (topProduct && topProduct.salesCount > 0) ? topProduct.name : "No Sales Yet";

            // 5. نسبة التحويل
            const convRate = totalViews > 0 ? ((orders.length / totalViews) * 100).toFixed(1) : 0;
            document.getElementById('conversionRate').innerText = convRate + '%';

            // 6. رندر القائمة
            const list = document.getElementById('productsAnalyticsList');
            const maxSales = topProduct && topProduct.salesCount > 0 ? topProduct.salesCount : 1;

            list.innerHTML = productsWithStats.map(p => {
                const percentage = (p.salesCount / maxSales) * 100;
                const imageUrl = p.image 
                    ? (p.image.startsWith('/uploads') ? 'http://localhost:3000' + p.image : p.image)
                    : 'https://via.placeholder.com/50';

                return `
                    <div class="product-row">
                        <img src="${imageUrl}" class="product-img" onerror="this.src='https://via.placeholder.com/50'">
                        <div>
                            <div style="font-weight:600; font-size:14px;">${p.name}</div>
                            <div class="view-bar-container">
                                <div class="view-bar-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        <div style="text-align: center;">
                            <span style="display:block; font-size:10px; color:var(--text-muted)">Sold</span>
                            <strong style="font-size:14px;">${p.salesCount}</strong>
                        </div>
                        <div style="text-align: right;">
                            <span class="trend-up">
                                ${p.salesCount > 0 ? '<i class="fas fa-check-circle"></i> Top Seller' : '<i class="fas fa-eye"></i> ' + (p.views || 0) + ' Views'}
                            </span>
                        </div>
                    </div>
                `;
            }).join("");

        } catch (error) {
            console.error("Analytics Error:", error);
        }
    }

    loadAnalytics();
</script>

</body>
</html>
