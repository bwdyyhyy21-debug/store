<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" type="image/png" href="imgs/logo2.png">
    <title>Pure Guard | Reset Password</title>
    <link rel="stylesheet" href="reset.css">
    <style>
        /* إضافة استايل سريع لضمان الشكل على الموبيل لو ملف الـ CSS مش كامل */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #f4f4f4;
            box-sizing: border-box;
        }

        .reset-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px; /* لضمان عدم تمدد الفورم على الكمبيوتر */
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%; /* العرض بالكامل بالنسبة للموبيل */
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* حجم خط مريح للعين على الموبيل */
            box-sizing: border-box; /* لضمان عدم خروج الإدخال عن الحاوية */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #333;
        }

        #error {
            min-height: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="reset-container">
    <h2>New Password</h2>

    <input id="code" type="text" placeholder="Enter 6-digit code">
    
    <input id="newPassword" type="password" placeholder="New Password">
    
    <button onclick="resetPassword()">Update Password</button>

    <div id="error" style="color:red; margin-top:15px;"></div>
</div>

<script src="auth.js"></script>

</body>
</html>
