<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" type="image/png" href="imgs/logo2.png">
    <title>Contact Us - Pure Guard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --border-color: #e2e2e2;
            --text-main: #1a1a1a;
            --text-light: #737373;
            --accent: #000000;
            --bg-body: #f9f9f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .contact-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            font-style: italic;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            gap: 12px;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* ألوان البراندات */
        .whatsapp { background-color: #25D366; }
        .facebook { background-color: #1877F2; }
        .instagram { background-color: #E4405F; }
        .back-home { 
            background-color: transparent; 
            color: var(--text-light); 
            border: 1px solid var(--border-color);
            margin-top: 20px;
        }
        .back-home:hover {
            background-color: #f0f0f0;
            color: var(--text-main);
        }

        .social-btn i {
            font-size: 20px;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-light);
        }
    </style>
</head>
<body>

<div class="contact-container">
    <div class="logo">Pure Guard</div>
    <div class="subtitle"></div>

    <div class="social-links">
        <a href="https://wa.me/201156450481" target="_blank" class="social-btn whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

        <a href="https://www.facebook.com/share/1FhShJgqgM/" target="_blank" class="social-btn facebook">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>



        <a href="index.html" class="social-btn back-home">
            <i class="fas fa-arrow-left"></i> Back to Shop
        </a>
    </div>


</div>

</body>
</html>
