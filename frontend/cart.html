<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
      <link rel="icon" type="image/png" href="imgs/logo2.png">
    <title>Pure Guard - Your Cart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; 
            padding: 40px 5%; 
            color: #1a1a1a; 
            box-sizing: border-box;
        }

        h2 { 
            font-size: 32px; 
            font-weight: 600; 
            margin-bottom: 30px; 
            border-bottom: 2px solid #000; 
            padding-bottom: 10px; 
            display: inline-block; 
        }

        .cart-item { 
            display: flex; 
            gap: 20px; 
            align-items: center; 
            margin-bottom: 15px; 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border: 1px solid #f0f0f0; 
        }

        .cart-item img { 
            width: 80px; 
            height: 80px; 
            object-fit: cover; 
            border-radius: 8px; 
        }

        .cart-item div { flex-grow: 1; }
        .cart-item h4 { margin: 0 0 5px 0; font-size: 18px; }
        .cart-item p { margin: 0; color: #666; font-weight: 600; }
        .cart-item button { 
            background: #ff3b30; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        h3#total { 
            margin-top: 40px; 
            font-size: 24px; 
            font-weight: 600; 
            text-align: right; 
            border-top: 2px solid #eee; 
            padding-top: 20px; 
        }

        h3#total::before { content: "Subtotal: "; color: #666; font-size: 18px; font-weight: 400; }

        .checkout { 
            float: right; 
            margin-top: 20px; 
            background: #000; 
            color: white; 
            padding: 16px 45px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.4s; 
            width: auto;
        }

        #cartItems:empty::after { 
            content: "Your cart is currently empty."; 
            color: #999; 
            display: block; 
            margin-top: 40px; 
            text-align: center; 
        }

        /* --- [ تعديلات الموبايل ] --- */
        @media (max-width: 600px) {
            body { padding: 20px; }
            
            h2 { font-size: 24px; width: 100%; text-align: center; }

            .cart-item { 
                flex-direction: column; /* العناصر تحت بعض */
                text-align: center; 
                padding: 15px; 
            }

            .cart-item img { 
                width: 120px; 
                height: 120px; 
            }

            .cart-item div { width: 100%; }

            .checkout { 
                width: 100%; /* زرار التشيك أوت بعرض الشاشة */
                float: none; 
                margin-bottom: 40px;
            }

            h3#total { text-align: center; font-size: 20px; }
        }
    </style>
</head>
<body>

<h2>🛒 Your Cart</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button class="checkout" onclick="goCheckout()">Checkout</button>

<script src="js/cart.js"></script>
<script>
    window.onload = loadCart;

    function goCheckout() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        if (cart.length === 0) {
            alert("Cart is empty!");
            return;
        }
        window.location.href = "checkout.html";
    }
</script>
</body>
</html>
