<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
  <title>Pure Guard | Store</title>
  <link rel="icon" type="image/png" href="imgs/logo2.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* منع السكرول الجانبي */
    html, body {
        max-width: 100%;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
        width: 100%;
    }

    /* --- [ دعم اللغة العربية RTL ] --- */
    body.rtl {
        direction: rtl;
        font-family: 'Cairo', sans-serif;
    }
    
    /* تظبيط الهوامش في وضع العربي */
    body.rtl .hero-content { text-align: right; }
    body.rtl .nav-menu { flex-direction: row-reverse; }

    /* --- [ حاوية الأقسام الرئيسية ] --- */
    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 15px;
    }

    .category-section {
        width: 100% !important;
        display: block !important;
        clear: both !important;
        margin-bottom: 60px !important;
    }

    .category-title {
        width: 100% !important;
        text-align: center !important;
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        margin-bottom: 30px !important;
        display: block !important;
    }

    .products-grid {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important;
        gap: 25px !important;
        width: 100% !important;
    }

    /* زرار اللغة */
    .btn-lang {
        background: #000;
        color: #fff;
        border: none;
        padding: 8px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        transition: 0.3s;
    }
    .btn-lang:hover { background: #333; }

    /* --- [ تعديلات الهيدر والأجهزة ] --- */
    @media (min-width: 769px) {
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        .nav-menu { display: flex !important; gap: 20px; align-items: center; }
    }

    @media (max-width: 768px) {
        .header-container {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 10px 15px !important;
            flex-wrap: wrap; 
        }
        .nav-menu {
            display: flex !important;
            width: 100% !important;
            justify-content: center !important;
            gap: 15px !important;
            order: 3; 
            padding-top: 10px !important;
            margin-top: 10px !important;
            border-top: 1px solid #eee;
        }
        .logo { order: 1; font-size: 20px !important; }
        .header-actions { order: 2; }
        .hero { flex-direction: column-reverse !important; text-align: center !important; padding: 30px 10px !important; }
        .hero-image img { max-width: 120px !important; }
        
        .products-grid {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
        }
        .product-card { width: 100% !important; max-width: 400px; }
    }
  </style>
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <a href="index.html" class="logo">PURE<span>GUARD</span></a>
        
        <nav class="nav-menu" id="mainNav">
            <a href="#products-section" data-i18n="nav_collection">Collection</a>
            <a href="contact.html" data-i18n="nav_contact">Contact</a>

            <div class="lang-switcher">
                <button onclick="toggleLanguage()" class="btn-lang">
                    <i class="fas fa-globe"></i>
                    <span id="langBtnText">العربية</span>
                </button>
            </div>
        </nav>

        <div class="header-actions">
            <a href="cart.html" class="action-item">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count">0</span>
            </a>
            <div id="userArea" class="user-menu"></div>
        </div>
    </div>
</header>

<main>
    <section class="hero">
        <div class="hero-content">
            <span class="hero-tagline">PUREGUARD</span>
            <h1 class="hero-title" data-i18n="hero_title">Our Newest products</h1>
            <p class="hero-desc" data-i18n="hero_desc">Store products to sell the latest and best raw materials.</p>
            <a href="#products-section" class="hero-btn" data-i18n="hero_btn">Shop Now</a>
        </div>
        <div class="hero-image">
            <img src="imgs/logo2.png" alt="Pure Guard Logo">
        </div>
    </section>

    <div id="products-section" class="container">
        <div id="products"></div> 
    </div>
</main>

<script src="js/cart.js"></script> 
<script src="js/main.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (typeof updateBadge === "function") {
      updateBadge();
    }
  });
</script>
</body>
</html>
