<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <link rel="icon" type="image/png" href="imgs/logo2.png">
    <title>Product Details | Pure Guard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- الأساسيات --- */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: #ffffff; 
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- الهيدر المظبوط (ثابت ومنظم) --- */
        .navbar {
            background: #111;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar h1 { margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .navbar a { color: white; margin-left: 15px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        
        .user-menu { position: relative; display: inline-block; }
        .username { color: white; cursor: pointer; font-weight: bold; margin-left: 15px; font-size: 14px; }
        .dropdown { 
            display: none; 
            position: absolute; 
            right: 0; 
            background: white; 
            color: black; 
            border-radius: 8px; 
            padding: 10px; 
            min-width: 120px; 
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* --- الحاوية الرئيسية --- */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* --- معرض الصور --- */
        .product-gallery { position: sticky; top: 80px; }
        .main-image-wrapper { 
            background-color: #f7f7f7; 
            border-radius: 15px; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        #mainImage { 
            width: 100%; 
            max-width: 450px; 
            height: auto; 
            mix-blend-mode: multiply; 
            object-fit: contain;
        }
        
        /* --- معلومات المنتج --- */
        .product-info { padding-top: 10px; }
        .breadcrumb { font-size: 12px; color: #888; margin-bottom: 15px; text-transform: capitalize; }
        #productName { font-size: 32px; font-weight: 600; margin: 0 0 10px 0; letter-spacing: -0.5px; line-height: 1.2; }
        #productCategory { font-size: 13px; color: #666; margin-bottom: 20px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        #productPrice { font-size: 28px; font-weight: 600; color: #000; margin-bottom: 30px; display: block; }
        
        .section-label { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: block; color: #1a1a1a; }
        #productDesc { font-size: 15px; line-height: 1.6; color: #555; margin-bottom: 30px; }
        
        /* زرار الإضافة للسلة */
        #addBtn { 
            background: #000; 
            color: #fff; 
            border: none; 
            padding: 18px; 
            border-radius: 50px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            transition: 0.3s;
            margin-bottom: 40px;
        }
        #addBtn:active { transform: scale(0.98); }

        /* --- التعليقات --- */
        .feedback-section { border-top: 1px solid #eee; padding-top: 30px; }
        .feedback-form { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        #fbInput { 
            padding: 15px 20px; 
            border-radius: 12px; 
            border: 1px solid #eee; 
            outline: none; 
            font-size: 14px;
            background: #f9f9f9;
        }
        #postBtn { 
            background: #1a1a1a; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600;
        }

        /* --- تعديلات الموبايل (Magic Touch) --- */
        @media (max-width: 768px) {
            .navbar h1 { font-size: 18px; }
            .container { 
                grid-template-columns: 1fr; /* خلى الصورة فوق والكلام تحت */
                gap: 25px; 
                margin-top: 10px;
            }
            .product-gallery { position: relative; top: 0; }
            #productName { font-size: 26px; }
            #productPrice { font-size: 24px; }
            .main-image-wrapper { padding: 15px; }
            
            /* تظبيط شكل المنيو في الموبايل */
            #nav-right { display: flex; align-items: center; }
            .navbar a { margin-left: 10px; font-size: 13px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>Pure guard</h1>
    <div id="nav-right">
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
        <span id="userArea">
            <a href="auth/login.html" id="loginLink">Login</a>
        </span>
    </div>
</nav>

<div class="container">
    <div class="product-gallery">
        <div class="main-image-wrapper">
            <img id="mainImage" src="" alt="Product">
        </div>
    </div>

    <div class="product-info">
        <div class="breadcrumb">Home / Catalog / <span id="currentCat">Product</span></div>
        
        <h1 id="productName">Loading...</h1>
        <span id="productCategory">Category</span>

        <span id="productPrice">0.00 EGP</span>

        <span class="section-label">Description</span>
        <p id="productDesc">Product description will appear here...</p>

        <div class="actions">
            <button id="addBtn">Add to cart</button>
        </div>

        <div class="feedback-section">
            <span class="section-label">Reviews</span>
            <div id="feedbackList"></div>
            
            <div class="feedback-form">
                <input type="text" id="fbInput" placeholder="Add a review...">
                <button id="postBtn" onclick="postFeedback()">Post Review</button>
            </div>
        </div>
    </div>
</div>

<script>
    // مزامنة الهيدر مع الحفاظ على الاستايل
    function syncNavbar() {
        const user = JSON.parse(localStorage.getItem("user"));
        const userArea = document.getElementById("userArea");
        
        if (user && userArea) {
            userArea.innerHTML = `
                <div class="user-menu">
                    <span class="username"> <i class="far fa-user"></i> ${user.username}</span>
                    <div class="dropdown">
                        <div onclick="logout()" style="cursor:pointer;">Logout</div>
                    </div>
                </div>`;
            
            const nameEl = userArea.querySelector(".username");
            const dropEl = userArea.querySelector(".dropdown");
            nameEl.onclick = (e) => {
                e.stopPropagation();
                dropEl.style.display = dropEl.style.display === "block" ? "none" : "block";
            };
            
            document.onclick = () => { dropEl.style.display = "none"; };
        }
    }

    function logout() {
        localStorage.removeItem("user");
        window.location.reload();
    }

    document.addEventListener("DOMContentLoaded", syncNavbar);
</script>

<script src="js/product-details.js"></script>
</body>
</html>
