<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <link rel="icon" type="image/png" href="imgs/logo2.png">
    <title>Pure Guard | Orders Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --sidebar-color: #0c0c0c;
            --main-bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #007bff;
            --text-muted: #888;
            --border: #2a2a2a;
            --success: #28a745;
        }

        /* منع السكول الجانبي نهائياً */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            background-color: var(--main-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        body {
            display: flex;
        }

        /* Sidebar - متجاوب وثابت */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-color); 
            height: 100vh;
            position: fixed;
            padding: 40px 20px;
            z-index: 1000;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .sidebar h2 { 
            font-size: 22px; 
            letter-spacing: 3px; 
            margin-bottom: 40px; 
            text-align: center;
            font-weight: 700;
        }

        .sidebar nav a { 
            color: var(--text-muted); 
            text-decoration: none; 
            display: flex;
            align-items: center;
            padding: 14px 20px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            font-size: 15px;
            transition: 0.3s;
            gap: 12px;
        }

        .sidebar nav a.active { background: var(--accent); color: white; }
        .sidebar nav a:hover:not(.active) { background: #1a1a1a; color: white; }

        /* Main Content - ضبط العرض لمنع التمدد الجانبي */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            flex: 1;
            width: calc(100% - 260px);
            min-width: 0; /* منع الـ flex item من تجاوز الحاوية */
            box-sizing: border-box;
            transition: 0.3s;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin: 30px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title span {
            background: var(--accent);
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Order Card - متجاوب */
        .order-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            width: 100%;
            box-sizing: border-box;
            overflow: hidden; /* ضمان عدم خروج المحتوى */
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .customer-name { color: var(--accent); font-size: 18px; font-weight: 600; }
        .order-time { color: var(--text-muted); font-size: 12px; }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-Pending { background: #ffc107; color: black; }
        .status-Shipped { background: var(--success); color: white; }

        .grid-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-label { color: #fff; font-weight: 600; font-size: 13px; margin-bottom: 5px; display: block; }
        .info-value { color: var(--text-muted); font-size: 13px; line-height: 1.5; word-break: break-word; }

        /* تظبيط الجدول للموبايل */
        .table-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch; /* سكول ناعم للموبايل */
        }
        .items-table { width: 100%; border-collapse: collapse; min-width: 350px; }
        .items-table th { text-align: left; color: var(--text-muted); font-weight: 400; padding-bottom: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .items-table td { padding: 10px 0; font-size: 13px; border-bottom: 1px solid #252525; }

        .payment-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }

        .payment-method {
            background: #252525;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--accent);
            border: 1px solid #333;
            display: flex; align-items: center; gap: 8px;
        }

        .total-section { font-size: 20px; font-weight: 700; }

        /* Action Row - منع التمدد */
        .action-row {
            background: #181818;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-row input {
            flex: 1;
            min-width: 120px;
            background: transparent;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .notify-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .notify-btn:active { transform: scale(0.98); }

        .shipped-label { color: var(--success); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }

        /* الموبايل والتابلت */
        @media (max-width: 992px) {
            .sidebar { width: 80px; padding: 40px 10px; }
            .sidebar h2 { font-size: 12px; letter-spacing: 1px; }
            .sidebar nav a span { display: none; }
            .sidebar nav a { justify-content: center; padding: 15px; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 20px; }
        }

        @media (max-width: 600px) {
            .sidebar {
                bottom: 0; top: auto; height: 65px; width: 100% !important; position: fixed; 
                padding: 0; display: flex; flex-direction: row; align-items: center;
                border-top: 1px solid var(--border);
            }
            .sidebar h2 { display: none; }
            .sidebar nav { display: flex; width: 100%; justify-content: space-around; padding: 0 10px; }
            .sidebar nav a { margin-bottom: 0; padding: 10px; flex-direction: column; gap: 4px; font-size: 10px; }
            .sidebar nav a i { font-size: 18px; }
            
            .main-content { 
                margin-left: 0 !important; 
                width: 100%;
                margin-bottom: 80px; 
                padding: 15px; 
            }
            .action-row input { width: 100%; flex: none; }
            .notify-btn { width: 100%; }
            .total-section { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>PURE GUARD</h2>
    <nav>
        <a href="admin.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
        <a href="categories.html"><i class="fas fa-tags"></i> <span>Categories</span></a>
        <a href="Analytics.html"><i class="fas fa-chart-bar"></i> <span>Analytics</span></a>
        <a href="orders.html" class="active"><i class="fas fa-shopping-basket"></i> <span>Orders</span></a>
        <a href="setadmin.html"><i class="fas fa-user-shield"></i> <span>Admins</span></a>  
        <a href="index.html"><i class="fas fa-shopping-bag"></i> <span>Store</span></a>
    </nav>
</div>

<div class="main-content">
    <h1 style="font-size: 24px; margin-bottom: 5px;">Orders Hub</h1>
    
    <div class="section-title">
        <i class="fas fa-clock"></i> Pending <span id="pendingCount">0</span>
    </div>
    <div id="pendingList"></div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">

    <div class="section-title" style="color: var(--text-muted);">
        <i class="fas fa-check-circle"></i> Sent & Closed <span id="closedCount">0</span>
    </div>
    <div id="closedList" style="opacity: 0.8;"></div>
</div>

<script>
    async function fetchOrders() {
        try {
            const response = await fetch("http://localhost:3000/admin/orders");
            const orders = await response.json();
            renderOrders(orders);
        } catch (error) {
            console.error("Fetch error:", error);
        }
    }

    function createOrderHtml(order) {
        const isShipped = order.status === 'Shipped';
        const isCard = order.paymentMethod?.toLowerCase().includes('card');
        const paymentIcon = isCard ? 'fa-credit-card' : 'fa-money-bill-wave';

        return `
            <div class="order-card">
                <div class="card-header">
                    <div>
                        <div class="customer-name">${order.shippingInfo.firstName} ${order.shippingInfo.lastName}</div>
                        <div class="order-time">${new Date(order.createdAt).toLocaleString()}</div>
                    </div>
                    <div class="status-badge status-${order.status}">${order.status}</div>
                </div>

                <div class="grid-info">
                    <div>
                        <span class="info-label">Contact</span>
                        <div class="info-value">${order.customerInfo.email}</div>
                        <div class="info-value">${order.customerInfo.phone}</div>
                    </div>
                    <div>
                        <span class="info-label">Shipping To</span>
                        <div class="info-value">${order.shippingInfo.address}</div>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table class="items-table">
                        <thead>
                            <tr><th>Product</th><th>Qty</th><th>Price</th></tr>
                        </thead>
                        <tbody>
                            ${order.items.map(item => `
                                <tr><td>${item.name}</td><td>x${item.qty}</td><td>${item.price} EGP</td></tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>

                <div class="payment-info">
                    <div class="payment-method">
                        <i class="fas ${paymentIcon}"></i>
                        ${order.paymentMethod || 'Cash on Delivery'}
                    </div>
                    <div class="total-section">${order.total} EGP</div>
                </div>

                ${isShipped ? `
                    <div class="shipped-label">
                        <i class="fas fa-check-double"></i> Notification Sent (${order.deliveryTime})
                    </div>
                ` : `
                    <div class="action-row">
                        <input type="text" id="time-${order._id}" placeholder="Time (e.g. 2 days)">
                        <button class="notify-btn" onclick="updateDelivery('${order._id}', '${order.customerInfo.email}')">
                            Notify
                        </button>
                    </div>
                `}
            </div>
        `;
    }

    function renderOrders(orders) {
        const pendingList = document.getElementById("pendingList");
        const closedList = document.getElementById("closedList");
        const pendingOrders = orders.filter(o => o.status === 'Pending');
        const shippedOrders = orders.filter(o => o.status === 'Shipped');

        document.getElementById("pendingCount").innerText = pendingOrders.length;
        document.getElementById("closedCount").innerText = shippedOrders.length;

        pendingList.innerHTML = pendingOrders.map(createOrderHtml).join("");
        closedList.innerHTML = shippedOrders.map(createOrderHtml).join("");
    }

    async function updateDelivery(orderId, email) {
        const timeInput = document.getElementById(`time-${orderId}`);
        const deliveryTime = timeInput.value;
        if (!deliveryTime) return alert("Please enter time first!");

        try {
            const response = await fetch("http://localhost:3000/admin/send-delivery-time", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ orderId, deliveryTime, customerEmail: email })
            });

            if (response.ok) {
                alert("Order marked as Shipped! ✅");
                fetchOrders();
            }
        } catch (error) {
            alert("Connection error.");
        }
    }

    fetchOrders();
</script>

</body>
</html>
